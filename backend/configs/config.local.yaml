# Local Development Configuration
# This file is automatically loaded when APP_ENV=local
# Override any settings from config.yaml here

server:
  addr: ":8080"
  mode: "debug"
  read_timeout: 10s
  write_timeout: 10s

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "${MEMEPERP_DATABASE_PASSWORD:-postgres}"  # Default for local only
  dbname: "memeperp"
  sslmode: "disable"  # OK for local development
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 1h

redis:
  addr: "localhost:6379"
  password: "${MEMEPERP_REDIS_PASSWORD:}"  # Empty password OK for local
  db: 0
  pool_size: 10

blockchain:
  # Base Sepolia Testnet — P0-1: Use public RPC, API key via env only
  rpc_url: "${MEMEPERP_BLOCKCHAIN_RPC_URL:-https://base-sepolia-rpc.publicnode.com}"
  chain_id: 84532  # Base Sepolia

  # Contract addresses (Redeployed 2026-02-28)
  position_address: "0x7611a924622B5f6bc4c2ECAAdB6DE078E741AcF6"

matching_engine:
  # Matching Engine (TypeScript service) URL — the ONLY field MatchingEngineConfig reads
  url: "http://localhost:8081"

# AUDIT-FIX M-18: Contract addresses belong under "blockchain", not "matching_engine"
# The Go struct MatchingEngineConfig only has a "URL" field — all other fields below
# were silently ignored when placed under matching_engine.
blockchain:
  # Contract addresses (Redeployed 2026-02-28) — extends blockchain section from config.yaml
  router_address: "0xF15197BA411b578dafC7936C241bE9DD725c22BE"
  vault_address: "0xcc4Fa8Df0686824F92d392Cb650057EA7D2EF46E"
  amm_address: "0x2c23046DC1595754528a10b8340F2AD8fdE05112"
  liquidation_address: "0x6Fb6325094B24AE5f458f7a34C63BE30Da9aAECA"
  funding_rate_address: "0xD6DD3947F8d80A031b69eBd825Be2384E787dC46"
  lending_pool_address: "0x98a7665301C0dB32ceff957e1A2c505dF8384CA4"
  price_feed_address: "0xfB347BC4Cc61C7FdCD862ED212A0e3866d205112"

  # P0-1: Private key MUST come from env — set MEMEPERP_BLOCKCHAIN_PRIVATE_KEY in .env.local
  private_key: "${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY}"

  # Indexer settings (local dev: faster polling)
  start_block: 0
  confirm_blocks: 1
  poll_interval: 1s

jwt:
  secret: "dev-jwt-secret-at-least-32-characters-long-for-testing"
  expiration: 24h

rate_limit:
  public_limit: 10000
  private_limit: 5000
  order_limit: 2000

security:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://127.0.0.1:3000"
  trusted_proxies: []

log:
  level: "debug"
  format: "console"
  output: "stdout"
