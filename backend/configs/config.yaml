server:
  addr: ":8080"
  mode: "debug"  # debug, release
  read_timeout: 10s
  write_timeout: 10s

database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "memeperp"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 1h

redis:
  addr: "localhost:6379"
  # AUDIT-FIX DP-C03: Redis password MUST be set via env var
  password: "${MEMEPERP_REDIS_PASSWORD}"
  db: 0
  pool_size: 10

blockchain:
  # BSC Testnet — P0-1: RPC URL must come from env in production
  rpc_url: "${MEMEPERP_BLOCKCHAIN_RPC_URL:-https://data-seed-prebsc-1-s1.binance.org:8545/}"
  chain_id: 97

  # Contract Addresses (BSC Testnet — deployed 2026-03-13)
  router_address: "${MEMEPERP_ROUTER_ADDRESS:-0xD99D1c33F9fC3444f8101754aBC46c52416550D1}"
  vault_address: "${MEMEPERP_VAULT_ADDRESS:-0x184BD81958eF34aA985e710BBDF90cA8DbBcb76C}"
  amm_address: "${MEMEPERP_AMM_ADDRESS:-0x2c23046DC1595754528a10b8340F2AD8fdE05112}"
  position_address: "${MEMEPERP_POSITION_ADDRESS:-0x60eF2d166DD1D3fAc42D7DaA14c9Eb6E055A6248}"
  liquidation_address: "${MEMEPERP_LIQUIDATION_ADDRESS:-0xadBBFE5F01290297050b2AB2a2BeF2DE244a83D0}"
  funding_rate_address: "${MEMEPERP_FUNDING_RATE_ADDRESS:-0xa33f2c84589079e7AC6037D81B472AF9cf421cC8}"
  lending_pool_address: "${MEMEPERP_LENDING_POOL_ADDRESS:-0x98a7665301C0dB32ceff957e1A2c505dF8384CA4}"
  price_feed_address: "${MEMEPERP_PRICE_FEED_ADDRESS:-0x016a65Fce5eC46ec563e1190986740ad4F2Fa789}"
  risk_manager_address: "${MEMEPERP_RISK_MANAGER_ADDRESS:-0xD22CCFDD884405c23CFaE08Da8437440FA724966}"
  presale_address: "0x0000000000000000000000000000000000000000"
  meme_token_address: "${MEMEPERP_MEME_TOKEN_ADDRESS:-0x0000000000000000000000000000000000000000}"

  # Settlement contracts (Deployed 2026-03-13)
  settlement_address: "${MEMEPERP_SETTLEMENT_ADDRESS:-0xB757f201e016495AB0DE7D9fda5c6CFFd2095426}"
  settlement_v2_address: "${MEMEPERP_SETTLEMENT_V2_ADDRESS:-0x606F418508993DaD0B230729a47672d087A9DB2C}"
  insurance_fund_address: "${MEMEPERP_INSURANCE_FUND_ADDRESS:-0x30a70a61C01FdB73d19a8Cc7aAe814a0a359adE2}"
  contract_registry_address: "${MEMEPERP_CONTRACT_REGISTRY_ADDRESS:-0x566c7584E1158977Fb3B0B28eae57C31E1FcF4e3}"
  perp_vault_address: "${MEMEPERP_PERP_VAULT_ADDRESS:-0xe61558F7cfb4BcCD999FeF4230965152eA4D3dc1}"

  # P0-1: Private key MUST come from env — NEVER hardcode in config files
  private_key: "${MEMEPERP_BLOCKCHAIN_PRIVATE_KEY}"

  # Indexer settings
  start_block: 0
  confirm_blocks: 3
  poll_interval: 3s

matching_engine:
  # TypeScript matching engine HTTP API (for Keeper position sync)
  url: "${MEMEPERP_MATCHING_ENGINE_URL:-http://localhost:8081}"

jwt:
  # AUDIT-FIX GO-C01: MUST set JWT_SECRET env var. No fallback — empty string forces startup failure
  secret: "${JWT_SECRET}"
  expiration: 24h

rate_limit:
  public_limit: 1200   # per minute
  private_limit: 600   # per minute
  order_limit: 300     # per minute

security:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
  trusted_proxies: []

log:
  level: "debug"   # debug, info, warn, error
  format: "json"   # json, console
  output: "stdout" # stdout, or file path
